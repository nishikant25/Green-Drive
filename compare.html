<section class="table-section">
<table>
<tr>
<th>Feature</th>
<th>EV</th>
<th>Petrol</th>
<th>Diesel</th>
</tr>
<tr>
<td>Fuel Cost/km</td>
<td>₹1–2</td>
<td>₹6–8</td>
<td>₹5–7</td>
</tr>
<tr>
<td>Maintenance</td>
<td>Low</td>
<td>Medium</td>
<td>High</td>
</tr>
<tr>

<td>Zero</td>

<td>Very High</td>
</tr>
</table>

<!-- 🔥 CALCULATOR -->
<section class="calculator">
<h2>💰 Smart Cost Calculator</h2>

<input type="number" id="distance" placeholder="Distance (km)">

<h3>⚡ EV</h3>
<input type="number" id="evCostInput" placeholder="Cost per km (₹)" value="1.5">

<h3>⛽ Petrol</h3>
<input type="number" id="petrolPrice" placeholder="Price per litre (₹)" value="100">
<input type="number" id="petrolMileage" placeholder="Mileage (km/l)" value="15">

<h3>🛢 Diesel</h3>
<input type="number" id="dieselPrice" placeholder="Price per litre (₹)" value="90">
<input type="number" id="dieselMileage" placeholder="Mileage (km/l)" value="20">

<button onclick="calculateCost()">Calculate</button>

<div class="result">
<p>⚡ EV Cost: <span id="evCost">₹ 0</span></p>
<p>⛽ Petrol Cost: <span id="petrolCost">₹ 0</span></p>
<p>🛢 Diesel Cost: <span id="dieselCost">₹ 0</span></p>
</div>
  <h2>🔮 5-Year Cost Predictor</h2>

<input type="number" id="km5" placeholder="Enter km per day">
<br>
<button onclick="predictCost()">Predict 5-Year Cost</button>

<div id="result5" class="cards"></div>
</section>

<!-- IMPORTANT: cache fix -->

<!-- your main JS file -->
<script src="script.js?v=5"></script>

<!-- 5-year predictor script -->
<script>
function predictCost() {
  let km = document.getElementById("km5").value;

  if (km === "") {
    alert("Enter distance!");
    return;
  }

  let evRate = 1.5;
  let petrolRate = 7;
  let dieselRate = 6;

  let totalEV = 0;
  let totalPetrol = 0;
  let totalDiesel = 0;

  for (let year = 1; year <= 5; year++) {
    petrolRate *= 1.08;
    dieselRate *= 1.07;

    let yearlyEV = km * evRate * 365;
    let yearlyPetrol = km * petrolRate * 365;
    let yearlyDiesel = km * dieselRate * 365;

    totalEV += yearlyEV;
    totalPetrol += yearlyPetrol;
    totalDiesel += yearlyDiesel;
  }

  let savePetrol = totalPetrol - totalEV;
  let saveDiesel = totalDiesel - totalEV;

  document.getElementById("result5").innerHTML = `
    <div class="card">
      <h3>⚡ EV (5 Years)</h3>
      <p>₹${Math.round(totalEV)}</p>
    </div>

    <div class="card">
      <h3>⛽ Petrol (5 Years)</h3>
      <p>₹${Math.round(totalPetrol)}</p>
    </div>

    <div class="card">
      <h3>🚛 Diesel (5 Years)</h3>
      <p>₹${Math.round(totalDiesel)}</p>
    </div>

    <div class="card">
      <h3>💰 Savings</h3>
      <p>vs Petrol: ₹${Math.round(savePetrol)}</p>
      <p>vs Diesel: ₹${Math.round(saveDiesel)}</p>
    </div>
  `;
}
</script>

</body>
</html>
