<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
<h1>⚡ Comparison</h1>
<nav>
<a href="index.html">Home</a>
<a href="compare.html">Compare</a>
<a href="cars.html">Cars</a>
<a href="myths.html">Myths</a>
</nav>
</header>

<section class="table-section">
<table>
<tr>
<th>Feature</th>
<th>EV</th>
<th>Petrol</th>
<th>Diesel</th>
</tr>
<tr>
<td>Fuel Cost/km</td>
<td>₹1–2</td>
<td>₹6–8</td>
<td>₹5–7</td>
</tr>
<tr>
<td>Maintenance</td>
<td>Low</td>
<td>Medium</td>
<td>High</td>
</tr>
<tr>
<td>Pollution</td>
<td>Zero</td>
<td>High</td>
<td>Very High</td>
</tr>
</table>
</section>

<!-- 🔥 CALCULATOR -->
<section class="calculator">
<h2>💰 Smart Cost Calculator</h2>

<input type="number" id="distance" placeholder="Distance (km)">

<h3>⚡ EV</h3>
<input type="number" id="evCostInput" placeholder="Cost per km (₹)" value="1.5">

<h3>⛽ Petrol</h3>
<input type="number" id="petrolPrice" placeholder="Price per litre (₹)" value="100">
<input type="number" id="petrolMileage" placeholder="Mileage (km/l)" value="15">

<h3>🛢 Diesel</h3>
<input type="number" id="dieselPrice" placeholder="Price per litre (₹)" value="90">
<input type="number" id="dieselMileage" placeholder="Mileage (km/l)" value="20">

<button onclick="calculateCost()">Calculate</button>

<div class="result">
<p>⚡ EV Cost: <span id="evCost">₹ 0</span></p>
<p>⛽ Petrol Cost: <span id="petrolCost">₹ 0</span></p>
<p>🛢 Diesel Cost: <span id="dieselCost">₹ 0</span></p>
</div>
</section>

<!-- IMPORTANT: cache fix -->
<script src="script.js?v=5"></script>

</body>
</html>
