<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
<h1>⚡ Comparison</h1>
<nav>
<a href="index.html">Home</a>
<a href="compare.html">Compare</a>
<a href="cars.html">Cars</a>
<a href="myths.html">Myths</a>
</nav>

<section class="table-section">
<table>
<tr>
<th>Feature</th>
<th>EV</th>
<th>Petrol</th>
<th>Diesel</th>
</tr>
<tr>
<td>Fuel Cost/km</td>
<td>₹1</td>
<td>₹7</td>
<td>₹6</td>
</tr>
<tr>
<td>Maintenance</td>
<td>Low</td>
<td>Medium</td>
<td>High</td>
</tr>
<tr>
<td>Pollution</td>
<td>Zero</td>
<td>High</td>
<td>Very High</td>
</tr>
</table>
</section>

<!-- 🔥 CALCULATOR SECTION -->
<section class="calculator">
<h2>💰 Cost Calculator</h2>

<input type="number" id="distance" placeholder="Enter distance (km)">
<button onclick="calculateCost()">Calculate</button>

<div class="result">
<p>⚡ EV Cost: <span id="evCost">0</span></p>
<p>⛽ Petrol Cost: <span id="petrolCost">0</span></p>
<p>🛢 Diesel Cost: <span id="dieselCost">0</span></p>
</div>
</section>

<script src="script.js"></script>
